<body>

    <header></header>

    <main>

        <Section id="cotizacionesDolar"> <!-- Flexbox -->
            <iframe class="item-iframe-blue" scrolling="no" src="https://dolarhoy.com/i/cotizaciones/dolar-blue"

            <iframe class="item-iframe" scrolling="no" src="https://dolarhoy.com/i/cotizaciones/dolar-mep"

            <iframe class="item-iframe" scrolling="no"
                src="https://dolarhoy.com/i/cotizaciones/dolar-bancos-y-casas-de-cambio" frameborder="0"></iframe>
        </section>


        <div class="containerBox2">

            <h1>Calculadora de IIGG</h1>

            <form>
                <div class="formulario-box">
                    <label for="sueldoBruto">Ingrese Sueldo Bruto:</label>
                    <input type="number" id="sueldoBruto" name="sueldoBruto">
                </div>
                <div class="formulario-box">
                    <label>¿Aportes sindicato?</label>
                    <div>
                        <input type="radio" id="sindicatoSi" name="sindicato" value="si">
                        <label for="sindicatoSi">Sí</label>
                    </div>
                    <div>
                        <input type="radio" id="sindicatoNo" name="sindicato" value="no">
                        <label for="sindicatoNo">No</label>
                    </div>
                    <div>
                        <label for="porcentaje">Porcentaje(%):</label>
                        <input type="number" id="sindicatoPorcentaje" name="porcentaje" min="1" max="100" placeholder="3-4%">
                    </div>
                </div>
                <div class="formulario-box">
                    <label>¿Casado?:</label>
                    <div>
                        <input type="radio" id="conyugeSi" name="conyuge" value="si" onchange="calcularSueldo()">
                        <label for="conyugeSi">Sí</label>
                    </div>
                    <div>
                        <input type="radio" id="conyugeNo" name="conyuge" value="no" onchange="calcularSueldo()">
                        <label for="conyugeNo">No</label>
                    </div>
                </div>
                <div class="formulario-box">
                    <label for="hijos">HIJOS:</label>
                    <select id="hijos" name="hijos" onchange="calcularSueldo()">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>
                </div>
                <div class="formulario-box">
                    <label for="alquiler">Alquiler:</label>
                    <input type="number" id="alquiler" name="alquiler" placeholder="Ej: Alquiler mensual.">
                </div>
                <div class="formulario-box">
                    <label for="otrasDeducciones">Otras deducciones:</label>
                    <input type="number" id="otrasDeducciones" name="otrasDeducciones" placeholder="Ej: Empleada domestica.">
                </div>

                <button id="calcularIIGG" class="boton4" type="button">Calcular</button>

                <div class="resultados" id="resultados">

                </div>

                <div id="donar-container">
                </div>



            </form>

        </div>
